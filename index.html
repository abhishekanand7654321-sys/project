<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hi my name is abhishek</title>
  <style>
    :root {
      color-scheme: dark;
      --text: #f8fbff;
      --muted: #b8c4d9;
      --coral: #ff7a7a;
      --gold: #ffd166;
      --aqua: #4ecdc4;
      --blue: #5b8cff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 122, 122, 0.32), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(78, 205, 196, 0.28), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(91, 140, 255, 0.30), transparent 34%),
        linear-gradient(135deg, #10172f 0%, #07111f 50%, #151123 100%);
      padding: 28px;
    }

    .shell {
      width: min(94vw, 840px);
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    nav a,
    .button-row a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    nav a {
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
    }

    nav a:hover,
    nav a.active {
      color: #08101f;
      background: linear-gradient(90deg, var(--gold), var(--aqua));
      box-shadow: 0 14px 34px rgba(78, 205, 196, 0.22);
      transform: translateY(-2px);
    }

    main {
      position: relative;
      text-align: center;
      padding: clamp(32px, 7vw, 72px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(22px);
    }

    main::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 24px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 22px var(--gold);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.5rem, 11vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 10px 36px rgba(0, 0, 0, 0.38);
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--coral), var(--gold), var(--aqua), #b8d0ff);
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      width: min(100%, 580px);
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .button-row a {
      color: #08101f;
      background: linear-gradient(90deg, var(--gold), var(--aqua));
      box-shadow: 0 14px 34px rgba(78, 205, 196, 0.25);
    }

    .button-row a:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px rgba(255, 209, 102, 0.25);
    }

    .button-row .outline {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      main {
        border-radius: 22px;
      }

      .eyebrow {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav aria-label="Main navigation">
      <a class="active" href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <main>
      <div class="eyebrow"><span class="spark"></span> First page online</div>
      <h1>Hello <span>World</span></h1>
      <p>A bright little starter page with glassy depth, colorful highlights, and just enough polish to make a classic feel brand new.</p>
      <div class="button-row">
        <a href="about.html">About Me</a>
        <a class="outline" href="contact.html">Contact</a>
      </div>
    </main>
  </div>
</body>
</html>
