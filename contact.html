<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Abhishek</title>
  <style>
    :root {
      color-scheme: dark;
      --text: #f8fbff;
      --muted: #b8c4d9;
      --coral: #ff7a7a;
      --gold: #ffd166;
      --aqua: #4ecdc4;
      --blue: #5b8cff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 22%, rgba(78, 205, 196, 0.30), transparent 28%),
        radial-gradient(circle at 84% 18%, rgba(255, 122, 122, 0.30), transparent 27%),
        radial-gradient(circle at 48% 86%, rgba(255, 209, 102, 0.22), transparent 34%),
        linear-gradient(135deg, #10172f 0%, #07111f 52%, #151123 100%);
      padding: 28px;
    }

    .shell { width: min(94vw, 880px); }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    nav a, .button-row a, button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    nav a {
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
    }

    nav a:hover, nav a.active {
      color: #08101f;
      background: linear-gradient(90deg, var(--gold), var(--aqua));
      box-shadow: 0 14px 34px rgba(78, 205, 196, 0.22);
      transform: translateY(-2px);
    }

    main {
      position: relative;
      padding: clamp(30px, 6vw, 64px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(22px);
    }

    main::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 22px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 22px var(--coral);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.4rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 10px 36px rgba(0, 0, 0, 0.38);
    }

    h1 span {
      color: transparent;
      background: linear-gradient(90deg, var(--coral), var(--gold), var(--aqua));
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 640px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.75;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 30px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: rgba(78, 205, 196, 0.78);
      box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.14);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 6px;
    }

    button, .button-row a {
      border: 0;
      color: #08101f;
      background: linear-gradient(90deg, var(--gold), var(--aqua));
      box-shadow: 0 14px 34px rgba(78, 205, 196, 0.25);
      cursor: pointer;
    }

    button:hover, .button-row a:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px rgba(255, 209, 102, 0.25);
    }

    .button-row .outline {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    @media (max-width: 720px) {
      .row { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      body { padding: 18px; }
      main { border-radius: 22px; }
      .eyebrow { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>

    <main>
      <div class="eyebrow"><span class="spark"></span> Say hello</div>
      <h1>Contact <span>Me</span></h1>
      <p>Drop a message, share an idea, or just say hi. This form is ready for a future backend, and it already looks sharp on the page.</p>

      <form>
        <div class="row">
          <label>Name
            <input type="text" name="name" placeholder="Your name" />
          </label>
          <label>Email
            <input type="email" name="email" placeholder="you@example.com" />
          </label>
        </div>
        <label>Message
          <textarea name="message" placeholder="Write your message here"></textarea>
        </label>
        <div class="button-row">
          <button type="submit">Send Message</button>
          <a class="outline" href="index.html">Back Home</a>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
